# Task pipeline definitions.
# Skills, rules, and commands listed here are injected into each task description by the runner.
# The runner also auto-detects skills from description keywords via SKILL_AUTO_KEYWORDS.

git_preflight_task:
  description: >
    TASK: "{description}"
    TASK_ID: {task_id}   BRANCH: {branch}

    Run preflight validation before any work starts:
    1. Confirm base branch is clean (no uncommitted changes)
    2. Check branch {branch} does not already exist
    3. Identify scope: which files/areas will likely be touched
    4. Draft initial COMMIT_MSG based on task description

    Output format (use these exact labels):
    SCOPE: <affected files/directories>
    RISKS: <any conflicts or concerns>
    COMMIT_MSG: <concise imperative commit message, max 72 chars>
  expected_output: >
    SCOPE, RISKS, COMMIT_MSG lines. No prose padding.
  agent: git_expert
  skills: [github-pull-requests]

plan_task:
  description: >
    Decompose this task into a sequenced implementation plan:
    TASK: "{description}"
    LINEAR: {linear_id}

    Output a numbered subtask list (max 8 items).
    Each item: what to do, why, what it depends on.
  expected_output: >
    Numbered subtask list. Each item: what, why, dependency. No prose padding.
  agent: planner

architect_task:
  description: >
    Design the technical approach for:
    TASK: "{description}"

    Specify exact files to create or modify, patterns to follow, edge cases to handle.
    Output a file-level spec the coder can execute without guessing.
  expected_output: >
    File list with action per file. Patterns to use. Edge cases to handle. No prose.
  agent: architect
  context: [plan_task]

code_task:
  description: >
    Implement the solution for:
    TASK: "{description}"
    PROJECT STRUCTURE: {project_context}

    Follow ALL project conventions. Surgical changes only — touch only what is required.
    Output fenced code blocks for every file created or modified.

    Format each file as:
    ```path/to/file.ts
    <full file content>
    ```
  expected_output: >
    Fenced code blocks for every changed file. One-line summary per file. Done.
  agent: coder
  context: [architect_task]
  skills: [ui-implementation]
  rules: [clean-code, git-conventions]

test_task:
  description: >
    TASK: "{description}"
    PROJECT STRUCTURE: {project_context}

    Write Playwright tests for the feature implemented in context.

    Step 1 — Classify: determine visual vs functional tests needed.
    Step 2 — Write tests with Action Sandwich pattern on every user action.
    Step 3 — Write or update POM components for any new UI elements.
    Step 4 — Self-review against Branch Scan Checklist before outputting.

    Output fenced code blocks for every test file and POM component.
  expected_output: >
    Fenced code blocks for test files and POM components. Classification summary. Done.
  agent: tester
  context: [code_task]
  skills: [e2e-tests]
  skill_sections:
    e2e-tests:
      - "Test Type Classification"
      - "Action Sandwich Pattern"
      - "POM Component Guidelines"
      - "Branch Scan Checklist"
  rules: [e2e-standards]
  commands: [testing/review-my-branch-e2e]

review_task:
  description: >
    Review the full implementation for:
    TASK: "{description}"

    Flag: logic errors, null refs, missing guards, security gaps, perf issues,
    convention violations.
    Format each comment as: file:line | emoji | type | issue | suggested fix.
  expected_output: >
    Inline review comments. PASS or list of required fixes. No prose padding.
  agent: pr_reviewer
  context: [code_task, test_task]

standards_task:
  description: >
    Verify ALL acceptance criteria for:
    TASK: "{description}"
    LINEAR: {linear_id}

    Check every original requirement is addressed.
    Verify coding conventions, project structure rules, test coverage requirements.
    Report any gap with exact rule violated and fix required.
  expected_output: >
    APPROVED or list of gaps. Each gap: requirement, what's missing, fix needed.
  agent: standards_guardian
  context: [plan_task, review_task]

git_task:
  description: >
    TASK: "{description}"
    TASK_ID: {task_id}
    BRANCH: {branch}

    Read all files changed by the crew. Produce final git artifacts.

    Output format (use these exact labels):
    COMMIT_MSG: <concise imperative commit message, max 72 chars>
    PR_TITLE: <PR title following project conventions>
    PR_BODY:
    <markdown PR body: summary, what changed, how to test>
    FILES: <comma-separated list of changed file paths>
    DONE
  expected_output: >
    COMMIT_MSG, PR_TITLE, PR_BODY, FILES, DONE. Exact labels. No extra prose.
  agent: git_expert
  context: [standards_task]
  skills: [github-pull-requests]
